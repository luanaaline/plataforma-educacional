<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz de Filosofia</title>
<link rel="icon" type="image/png" href="psiu.png">

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: "Georgia", serif;
        background: url("querida.png") no-repeat center;
        background-size: cover;
        text-align: center;
    }

    .container {
        width: 100%;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }

    h1 {
        font-size: 64px;
        font-weight: bold;
        color: black;
        margin-bottom: 40px;
    }

    .btn {
        background: #ab7fcd;
        padding: 18px 60px;
        border-radius: 40px;
        font-size: 22px;
        font-weight: bold;
        color: black;
        text-decoration: none;
        cursor: pointer;
        border: none;
        transition: 0.3s;
        font-family: "Georgia", serif;
    }

    .btn:hover {
        background: #784e99;
        transform: scale(1.05);
    }

    .btn-voltar {
        position: fixed;
        left: 20px;
        bottom: 20px;
        background: #ab7fcd;
        padding: 12px 25px;
        border-radius: 25px;
        font-size: 18px;
        font-weight: bold;
        color: black;
        text-decoration: none;
        transition: 0.3s;
        font-family: "Georgia", serif;
    }

    .btn-voltar:hover {
        background: #784e99;
        transform: scale(1.05);
    }

  /* DARK MODE */

body.dark-mode {
    background-image: url("bay.png");
    
}

body.dark-mode h1 {
    color: #ab7fcd;
}

</style>

</head>
<body>



<div class="container">
    <h1>Quiz Finalizado! ✔️</h1>

    <!-- Botão que agora vai para geo-quiz.html -->
    <a href="gab-filosofia.html" class="btn">Gabarito</a>
</div>

<script>

// Aplica automaticamente o tema salvo
document.addEventListener("DOMContentLoaded", () => {
    const temaSalvo = localStorage.getItem("theme");

    if (temaSalvo === "dark") {
      document.body.classList.add("dark-mode");
    } else {
      document.body.classList.remove("dark-mode");
    }
  });

</script>

</body>
</html>
