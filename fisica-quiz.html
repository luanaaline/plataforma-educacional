<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Física - Quiz</title>
<link rel="icon" type="image/png" href="psiu.png">
 
<style>
    body {
        margin: 0;
        background: #e6d4f5;
        font-family: "Poppins", sans-serif;
    }
 
    h1 {
        text-align: center;
        padding: 40px;
        font-size: 36px;
        font-weight: 600;
    }
 
    .container {
        max-width: 900px;
        background: white;
        margin: auto;
        padding: 40px;
        border-radius: 30px;
        text-align: center;
    }
 
    .question {
        font-size: 20px;
        line-height: 1.6;
        margin-bottom: 40px;
    }
 
    .option {
        background: #f5e8ff;
        padding: 20px;
        margin: 15px auto;
        width: 80%;
        border-radius: 50px;
        cursor: pointer;
        transition: 0.2s;
        font-size: 18px;
        border: 3px solid transparent;
    }
 
    .option:hover {
        background: #d9c2f0;
    }
 
    .selected {
        border: 3px solid #7b2cbf;
        background: #e9d1ff !important;
    }
 
    .btn-area {
        margin-top: 30px;
        display: flex;
        justify-content: center;
        gap: 20px;
    }
 
    .btn {
        background: white;
        padding: 15px 40px;
        border-radius: 40px;
        border: 2px solid #000;
        cursor: pointer;
        transition: 0.2s;
        font-size: 18px;
    }
 
    .btn:hover {
        background: #f0f0f0;
    }
 
    #revisar {
        display: none;
    }

/* DARK MODE */

body.dark-mode {
    background: #1b1030;          
    color: #f5e8ff;               
}

/* Container */
body.dark-mode .container {
    background: #2a183a;         
    color: #f5e8ff;
}

/* Opções */
body.dark-mode .option {
    background: #3a2352;          
    color: #f5e8ff;
}

body.dark-mode .option:hover {
    background: #4b2b6d;          
}

body.dark-mode .selected {
    border: 3px solid #c38aff;    
    background: #5c3386 !important;
}

/* Botões */
body.dark-mode .btn {
    background: #3a2352;
    color: #f5e8ff;
    border: 2px solid #c38aff;
}

body.dark-mode .btn:hover {
    background: #4b2b6d;
}

/* Título */
body.dark-mode h1 {
    color: #e7c6ff;
}

/* Número da questão */
body.dark-mode #qnumber {
    color: #e7c6ff;
}

</style>
</head>
<body>
 
<h1>Física</h1>
 
<div class="container">
 
    <h2 id="qnumber">QUESTÃO 1</h2>
    <p id="question" class="question"></p>
 
    <div id="options"></div>
 
    <div class="btn-area">
        <button id="revisar" class="btn" onclick="prevQuestion()">Revisar</button>
        <button class="btn" onclick="nextQuestion()">Próxima</button>
    </div>
 
</div>
 
<script>
const questions = [
    {
        q: "Qual é a unidade de força no Sistema Internacional (SI)?",
        a: [
            "Joule",
            "Newton",
            "Watt",
            "Pascal"
        ]
    },
    {
        q: "Qual é a velocidade da luz no vácuo?",
        a: [
            "3 × 10⁶ m/s",
            "3 × 10⁸ m/s",
            "3 × 10⁵ m/s",
            "3 × 10⁹ m/s"
        ]
    },
    {
        q: "O que é aceleração?",
        a: [
            "Mudança de posição",
            "Mudança de velocidade",
            "Força aplicada",
            "Energia cinética"
        ]
    },
    {
        q: "Qual lei afirma que “ação e reação são iguais e opostas”?",
        a: [
            "Primeira lei de Newton",
            "Segunda lei de Newton",
            "Terceira lei de Newton",
            "Lei da Gravitação Universal"
        ]
    },
    {
        q: "Qual é a fórmula da velocidade média?",
        a: [
            "v = d/t",
            "v = m · a",
            "v = F/m",
            "v = E/p"
        ]
    },
    {
        q: "O que é energia potencial gravitacional?",
        a: [
            "Energia por movimento",
            "Energia devido à posição",
            "Energia térmica",
            "Energia química"
        ]
    },
    {
        q: "Qual fenômeno explica a refração da luz?",
        a: [
            "Mudança de velocidade da luz",
            "Reflexão da luz",
            "Difração",
            "Interferência"
        ]
    },
    {
        q: "Qual é a unidade de pressão no SI?",
        a: [
            "Pascal",
            "Newton",
            "Joule",
            "Watt"
        ]
    },
    {
        q: "Um corpo de 2 kg está acelerando a 3 m/s². Qual é a força sobre ele?",
        a: [
            "2 N",
            "3 N",
            "6 N",
            "5 N"
        ]
    },
    {
        q: "O que é a lei de conservação da energia?",
        a: [
            "Energia pode ser criada",
            "Energia total permanece constante",
            "Energia é sempre cinética",
            "Energia só aumenta"
        ]
    }
];

 
let current = 0;
let answers = new Array(questions.length).fill(null);
 
function loadQuestion() {
    document.getElementById("qnumber").innerText = "QUESTÃO " + (current + 1);
    document.getElementById("question").innerText = questions[current].q;
 
    const optArea = document.getElementById("options");
    optArea.innerHTML = "";
 
    questions[current].a.forEach((alt, i) => {
        let div = document.createElement("div");
        div.classList.add("option");
        div.innerText = alt;
 
        if (answers[current] === i) {
            div.classList.add("selected");
        }
 
        div.onclick = () => {
            document.querySelectorAll(".option").forEach(o => o.classList.remove("selected"));
            div.classList.add("selected");
            answers[current] = i;
        };
 
        optArea.appendChild(div);
    });
 
    const revisarBtn = document.getElementById("revisar");
    revisarBtn.style.display = current === 0 ? "none" : "inline-block";
}
 
function nextQuestion() {
    if (answers[current] === null) {
        alert("Selecione uma alternativa para continuar.");
        return;
    }
 
    if (current < questions.length - 1) {
        current++;
        loadQuestion();
    } else {
        // ⭐ SALVAR TODAS AS RESPOSTAS ⭐
        localStorage.setItem("quizAnswers", JSON.stringify(answers));
 
        // ⭐ REDIRECIONAR PARA O GABARITO ⭐
        window.location.href = "final-fisica.html";
    }
}
 
function prevQuestion() {
    if (current > 0) {
        current--;
        loadQuestion();
    }
}
 
loadQuestion();

// Aplica automaticamente o tema salvo
document.addEventListener("DOMContentLoaded", () => {
    const temaSalvo = localStorage.getItem("theme");

    if (temaSalvo === "dark") {
      document.body.classList.add("dark-mode");
    } else {
      document.body.classList.remove("dark-mode");
    }
  });

</script>
 
</body>
</html>
