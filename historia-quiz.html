<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>História - Quiz</title>
<link rel="icon" type="image/png" href="psiu.png">
 
<style>
    body {
        margin: 0;
        background: #e6d4f5;
        font-family: "Poppins", sans-serif;
    }
 
    h1 {
        text-align: center;
        padding: 40px;
        font-size: 36px;
        font-weight: 600;
    }
 
    .container {
        max-width: 900px;
        background: white;
        margin: auto;
        padding: 40px;
        border-radius: 30px;
        text-align: center;
    }
 
    .question {
        font-size: 20px;
        line-height: 1.6;
        margin-bottom: 40px;
    }
 
    .option {
        background: #f5e8ff;
        padding: 20px;
        margin: 15px auto;
        width: 80%;
        border-radius: 50px;
        cursor: pointer;
        transition: 0.2s;
        font-size: 18px;
        border: 3px solid transparent;
    }
 
    .option:hover {
        background: #d9c2f0;
    }
 
    .selected {
        border: 3px solid #7b2cbf;
        background: #e9d1ff !important;
    }
 
    .btn-area {
        margin-top: 30px;
        display: flex;
        justify-content: center;
        gap: 20px;
    }
 
    .btn {
        background: white;
        padding: 15px 40px;
        border-radius: 40px;
        border: 2px solid #000;
        cursor: pointer;
        transition: 0.2s;
        font-size: 18px;
    }
 
    .btn:hover {
        background: #f0f0f0;
    }
 
    #revisar {
        display: none;
    }

/* DARK MODE */

body.dark-mode {
    background: #1b1030;          
    color: #f5e8ff;               
}

/* Container */
body.dark-mode .container {
    background: #2a183a;         
    color: #f5e8ff;
}

/* Opções */
body.dark-mode .option {
    background: #3a2352;          
    color: #f5e8ff;
}

body.dark-mode .option:hover {
    background: #4b2b6d;          
}

body.dark-mode .selected {
    border: 3px solid #c38aff;    
    background: #5c3386 !important;
}

/* Botões */
body.dark-mode .btn {
    background: #3a2352;
    color: #f5e8ff;
    border: 2px solid #c38aff;
}

body.dark-mode .btn:hover {
    background: #4b2b6d;
}

/* Título */
body.dark-mode h1 {
    color: #e7c6ff;
}

/* Número da questão */
body.dark-mode #qnumber {
    color: #e7c6ff;
}


</style>
</head>
<body>
 
<h1>História</h1>
 
<div class="container">
 
    <h2 id="qnumber">QUESTÃO 1</h2>
    <p id="question" class="question"></p>
 
    <div id="options"></div>
 
    <div class="btn-area">
        <button id="revisar" class="btn" onclick="prevQuestion()">Revisar</button>
        <button class="btn" onclick="nextQuestion()">Próxima</button>
    </div>
 
</div>
 
<script>
const questions = [
    {
        q: "Quem foi o primeiro imperador do Brasil?",
        a: [
            "Pedro II",
            "Pedro I",
            "Dom João VI",
            "Getúlio Vargas"
        ]
    },
    {
        q: "Quando ocorreu a Independência do Brasil?",
        a: [
            "7 de setembro de 1822",
            "15 de novembro de 1889",
            "22 de abril de 1500",
            "25 de março de 1808"
        ]
    },
    {
        q: "Qual evento marcou o início da Revolução Francesa?",
        a: [
            "Queda da Bastilha",
            "Golpe de Napoleão",
            "Declaração dos Direitos Humanos",
            "Congresso de Viena"
        ]
    },
    {
        q: "O que foi a Guerra Fria?",
        a: [
            "Conflito entre Brasil e Argentina",
            "Conflito ideológico entre EUA e URSS",
            "Conflito na Segunda Guerra Mundial",
            "Revolução Russa"
        ]
    },
    {
        q: "Quem foi Tiradentes?",
        a: [
            "Líder da Inconfidência Mineira",
            "Primeiro presidente do Brasil",
            "Escritor romântico",
            "Rei de Portugal"
        ]
    },
    {
        q: "Qual civilização antiga construiu as pirâmides do Egito?",
        a: [
            "Grega",
            "Egípcia",
            "Romana",
            "Mesopotâmica"
        ]
    },
    {
        q: "Quando ocorreu a Proclamação da República no Brasil?",
        a: [
            "7 de setembro de 1822",
            "15 de novembro de 1889",
            "22 de abril de 1500",
            "25 de março de 1808"
        ]
    },
    {
        q: "Quem foi líder do movimento abolicionista brasileiro?",
        a: [
            "Zumbi dos Palmares",
            "Joaquim Nabuco",
            "Dom Pedro II",
            "José Bonifácio"
        ]
    },
    {
        q: "Qual guerra mundial ocorreu entre 1939 e 1945?",
        a: [
            "Primeira Guerra Mundial",
            "Segunda Guerra Mundial",
            "Guerra Fria",
            "Revolução Industrial"
        ]
    },
    {
        q: "Qual civilização criou o Código de Hamurabi?",
        a: [
            "Egípcia",
            "Mesopotâmica",
            "Romana",
            "Grega"
        ]
    }
];

 
let current = 0;
let answers = new Array(questions.length).fill(null);
 
function loadQuestion() {
    document.getElementById("qnumber").innerText = "QUESTÃO " + (current + 1);
    document.getElementById("question").innerText = questions[current].q;
 
    const optArea = document.getElementById("options");
    optArea.innerHTML = "";
 
    questions[current].a.forEach((alt, i) => {
        let div = document.createElement("div");
        div.classList.add("option");
        div.innerText = alt;
 
        if (answers[current] === i) {
            div.classList.add("selected");
        }
 
        div.onclick = () => {
            document.querySelectorAll(".option").forEach(o => o.classList.remove("selected"));
            div.classList.add("selected");
            answers[current] = i;
        };
 
        optArea.appendChild(div);
    });
 
    const revisarBtn = document.getElementById("revisar");
    revisarBtn.style.display = current === 0 ? "none" : "inline-block";
}
 
function nextQuestion() {
    if (answers[current] === null) {
        alert("Selecione uma alternativa para continuar.");
        return;
    }
 
    if (current < questions.length - 1) {
        current++;
        loadQuestion();
    } else {
        // ⭐ SALVAR TODAS AS RESPOSTAS ⭐
        localStorage.setItem("quizAnswers", JSON.stringify(answers));
 
        // ⭐ REDIRECIONAR PARA O GABARITO ⭐
        window.location.href = "final-historia.html";
    }
}
 
function prevQuestion() {
    if (current > 0) {
        current--;
        loadQuestion();
    }
}
 
loadQuestion();

// Aplica automaticamente o tema salvo
document.addEventListener("DOMContentLoaded", () => {
    const temaSalvo = localStorage.getItem("theme");

    if (temaSalvo === "dark") {
      document.body.classList.add("dark-mode");
    } else {
      document.body.classList.remove("dark-mode");
    }
  });


</script>
 
</body>
</html>
