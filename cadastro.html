<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro | EducaÊ</title>
  <link rel="stylesheet" href="cadastro.css">
  <link rel="icon" type="image/png" href="psiu.png">
</head>
<body>
  <div class="container">
    <div class="form-box">
      <img src="logo-completa.png" alt="Logo EducaÊ" class="logo">

      <h2>Cadastre-se para continuar</h2>

      <input type="email" placeholder="Insira seu Email" class="input-email">
      <input type="password" placeholder="Crie uma Senha" class="input-senha">
      <button class="botao-cadastrar">Cadastrar</button>

      <p class="ou">Ou:</p>

      <div class="login-social">
        <button><img src="google-img.png" alt="">Google</button>
        <button><img src="microsoft-img.png" alt="">Microsoft</button>
        <button><img src="apple-img.png" alt="">Apple</button>
      </div>

      <p class="login">Já tem uma conta? <a href="login.html">Entrar</a></p>
    </div>
  </div>
  <script src="cadastro.js"></script>
</body>
</html>
