<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Biologia - Videoaulas</title>

<style>
/* ---------- RESET & FONT ---------- */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Poppins',sans-serif;background:#f7f1ff;color:#3e206d;min-height:100vh}

/* ---------- LAYOUT ---------- */
.app { display:flex; min-height:100vh }

/* SIDEBAR */
.sidebar{
  width:180px;
  background:#e7d5ff;
  padding:28px 14px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:14px;
  box-shadow:2px 0 10px rgba(0,0,0,0.06);
  position:fixed; left:0; top:0; bottom:0;
}
.logo { width:140px; height:100px; background:url('book-character.png') center/contain no-repeat; margin-bottom:6px }
.side-btn {
  width:100%;
  background:transparent;
  border:none;
  padding:10px 12px;
  border-radius:12px;
  font-weight:700;
  color:#3e206d;
  cursor:pointer;
  text-align:left;
  display:flex;
  align-items:center;
  gap:10px;
  transition:0.18s;
}
.side-btn:hover{background:#d9c0ff; transform:translateX(6px)}

/* CONTENT */
.content { margin-left:220px; padding:36px 48px; width:100% }

/* HEADER */
.header-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:26px;
}
.search-wrap{
  flex:1;
  max-width:640px;
  background:#e9ddff;
  padding:10px 14px;
  border-radius:18px;
  display:flex;
  align-items:center;
  gap:8px;
}
.search-wrap input{
  border:none;background:transparent;outline:none;font-size:15px;color:#3e206d;width:100%;
}

/* GRID */
.grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:22px }

/* CARD */
.card{
  background:#c49bff;
  border-radius:14px;
  padding:18px;
  height:160px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  position:relative;
  transition: transform .18s, box-shadow .18s;
  cursor:pointer;
  box-shadow:0 6px 14px rgba(0,0,0,0.06);
}
.card:hover{transform:translateY(-6px); box-shadow:0 10px 20px rgba(0,0,0,0.09)}
.card h4{font-size:16px;color:#2b1055;margin-bottom:6px}

/* BTN GROUP inside card */
.btns{
  display:flex;
  gap:8px;
  align-items:center;
}
.small-btn{
  background:#fff;border:none;border-radius:999px;padding:8px 10px;font-weight:700;cursor:pointer;box-shadow:0 3px 8px rgba(0,0,0,0.08)
}
.small-btn:hover{transform:scale(1.06)}

/* MESSAGES */
.note { margin-top:18px; color:#5a3c7a; font-weight:700 }

/* RESPONSIVE */
@media(max-width:1200px){ .grid{grid-template-columns:repeat(3,1fr)} }
@media(max-width:900px){ .grid{grid-template-columns:repeat(2,1fr)} .content{padding:22px} }
@media(max-width:600px){ .sidebar{display:none} .content{margin-left:20px;padding:18px} .grid{grid-template-columns:1fr} }

/* DARK MODE */
body.dark-mode{background:#1e0035;color:#e0d6ff}
body.dark-mode .sidebar{background:#2a0050}
body.dark-mode .search-wrap{background:#fdfcff}
body.dark-mode .card{background:#4a009e;color:#f0e5ff}
body.dark-mode .card h4{color:#f0e5ff}
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar" aria-label="Barra lateral">
    <div class="logo" aria-hidden="true"></div>
    <button class="side-btn" id="btnTodos">📚 Todos</button>
    <button class="side-btn" id="btnSalvos">💾 Salvos</button>
    <button class="side-btn" id="btnFavoritos">⭐ Favoritos</button>
    <div style="flex:1"></div>
    <button class="side-btn" id="btnVoltar">⬅ Voltar</button>
  </aside>

  <main class="content">
    <div class="header-row">
      <div class="search-wrap">
        <input id="searchInput" placeholder="Buscar tema (ex: Fotossíntese, DNA...)" />
        <button id="searchBtn" class="small-btn">🔍</button>
      </div>
      <div style="min-width:120px;text-align:right;color:#6a1b9a;font-weight:700">Biologia — Videoaulas</div>
    </div>
    <div id="grid" class="grid" aria-live="polite"></div>
    <div id="mensagem" class="note" style="display:none"></div>
  </main>
</div>

<script>
const aulas = [
  { titulo: "Biomas Brasileiros", link: "https://www.youtube.com/watch?v=RtCJk4wa50U" },
  { titulo: "Fotossíntese", link: "https://www.youtube.com/watch?v=hRSFZPk7yGk" },
  { titulo: "Ciclos Biogeoquímicos", link: "https://www.youtube.com/watch?v=GkAdsxETLUs" },
  { titulo: "Ciclos Biogeoquímicos: Carbono", link: "https://www.youtube.com/watch?v=thodJM9eS9Q" },
  { titulo: "Ciclos Biogeoquímicos: Nitrogênio", link: "https://www.youtube.com/watch?v=XbWO9hv3304Y" },
  { titulo: "Ecossistemas", link: "https://www.youtube.com/watch?v=VO0z1u7YPxA" },
  { titulo: "Cadeia Alimentar e Teia Alimentar", link: "https://www.youtube.com/watch?v=QQAqN7qL8Yg" },
  { titulo: "Estrutura da Célula", link: "https://www.youtube.com/watch?v=hafFiUsN02I" },
  { titulo: "Respiração Celular", link: "https://www.youtube.com/watch?v=mZ7dv3UKIGo" },
  { titulo: "Mitose e Meiose", link: "https://www.youtube.com/watch?v=f5B5sZZ4vuQ" },
  { titulo: "DNA e RNA: Estrutura", link: "https://www.youtube.com/watch?v=LFqaBPFXAh0" },
  { titulo: "Síntese Proteica", link: "https://www.youtube.com/watch?v=KNrCv-Iw2Yo" },
  { titulo: "Sistema Circulatório Humano", link: "https://www.youtube.com/watch?v=89aQ8HufFy8" },
  { titulo: "Sistema Nervoso", link: "https://www.youtube.com/watch?v=yNZhzEwXNYU" },
  { titulo: "Sistema Respiratório", link: "https://www.youtube.com/watch?v=wvaaEkqtQe8" },
  { titulo: "Sistema Digestório", link: "https://www.youtube.com/watch?v=piyByVSQra8" },
  { titulo: "Genética", link: "https://www.youtube.com/watch?v=tUtj4HIg4Wo" },
  { titulo: "Primeira Lei de Mendel", link: "https://www.youtube.com/watch?v=blzdQ3ifxnI" },
  { titulo: "Gene Dominante Recessivo", link: "https://www.youtube.com/watch?v=PKBqDofHJaU" },
  { titulo: "Genótipo e Fenótipo", link: "https://www.youtube.com/watch?v=FhgKfSSMOYIs" },
  { titulo: "Heredograma", link: "https://www.youtube.com/watch?v=cDwqguMXyxs" },
  { titulo: "Segunda Lei de Mendel", link: "https://www.youtube.com/watch?v=9WfJhG8jI1g" },
  { titulo: "Sistema ABO e RH", link: "https://www.youtube.com/watch?v=YHVGww7D7Ig" },
  { titulo: "Tipagem Sanguínea", link: "https://www.youtube.com/watch?v=RJrgWIDQzOM&t=35s" },
  { titulo: "Interação Gênica", link: "https://www.youtube.com/watch?v=TDej2xDBMQo" },
  { titulo: "Epistasia", link: "https://www.youtube.com/watch?v=08LPYpObAxw" },
  { titulo: "Herança Quantitativa", link: "https://www.youtube.com/watch?v=wa0nugLHz5U" },
  { titulo: "Triângulo de Pascal", link: "https://www.youtube.com/watch?v=5u7CK4PxanM" }
];

const KEY_SALVOS = 'bio_salvos_v1';
const KEY_FAVS = 'bio_favs_v1';
let filtro = 'todos';
let salvos = JSON.parse(localStorage.getItem(KEY_SALVOS) || '[]');
let favs = JSON.parse(localStorage.getItem(KEY_FAVS) || '[]');

const gridEl = document.getElementById('grid');
const msgEl = document.getElementById('mensagem');
const searchInput = document.getElementById('searchInput');

function salvarLocal(key, arr){ localStorage.setItem(key, JSON.stringify(arr)); }

function renderizar(){
  gridEl.innerHTML = '';
  msgEl.style.display='none';
  let indices = aulas.map((_,i)=>i);
  if(filtro==='salvos') indices=salvos.slice();
  if(filtro==='favoritos') indices=favs.slice();
  const termo=(searchInput.value||'').toLowerCase().trim();
  indices = indices.filter(i=>aulas[i].titulo.toLowerCase().includes(termo));
  if(indices.length===0){
    msgEl.textContent = filtro==='salvos' ? 'Nenhuma videoaula salva.' :
                     filtro==='favoritos' ? 'Nenhum favorito.' :
                     'Nenhum resultado encontrado.';
    msgEl.style.display='block';
    return;
  }
  indices.forEach(i=>{
    const item = aulas[i];
    const card = document.createElement('article');
    card.className='card';
    card.setAttribute('data-idx',i);
    card.innerHTML = `<div><h4>${item.titulo}</h4></div>
      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px">
        <div class="btns">
          <button class="small-btn" data-action="assistir">▶️ Assistir</button>
          <button class="small-btn" data-action="salvar">${ salvos.includes(i) ? '✔ Salvo' : '💾 Salvar' }</button>
          <button class="small-btn" data-action="fav">${ favs.includes(i) ? '★ Favorito' : '⭐ Favoritar' }</button>
        </div>
      </div>`;
    card.querySelector('[data-action="assistir"]').addEventListener('click',(e)=>{e.stopPropagation(); window.open(item.link,'_blank')});
    card.querySelector('[data-action="salvar"]').addEventListener('click',(e)=>{e.stopPropagation(); toggleSalvar(i); renderizar(); });
    card.querySelector('[data-action="fav"]').addEventListener('click',(e)=>{e.stopPropagation(); toggleFav(i); renderizar(); });
    card.addEventListener('click',()=>{ window.open(item.link,'_blank') });
    gridEl.appendChild(card);
  });
}

function toggleSalvar(idx){
  const pos=salvos.indexOf(idx);
  if(pos===-1){ salvos.push(idx); salvarLocal(KEY_SALVOS,salvos); toast('Adicionado aos salvos'); }
  else{ salvos.splice(pos,1); salvarLocal(KEY_SALVOS,salvos); toast('Removido dos salvos'); }
}

function toggleFav(idx){
  const pos=favs.indexOf(idx);
  if(pos===-1){ favs.push(idx); salvarLocal(KEY_FAVS,favs); toast('Adicionado aos favoritos'); }
  else{ favs.splice(pos,1); salvarLocal(KEY_FAVS,favs); toast('Removido dos favoritos'); }
}

document.getElementById('btnTodos').addEventListener('click',()=>{filtro='todos'; renderizar();});
document.getElementById('btnSalvos').addEventListener('click',()=>{filtro='salvos'; renderizar();});
document.getElementById('btnFavoritos').addEventListener('click',()=>{filtro='favoritos'; renderizar();});
document.getElementById('btnVoltar').addEventListener('click',()=>{window.location.href='videoaula.html';});

document.getElementById('searchBtn').addEventListener('click',renderizar);
searchInput.addEventListener('input',renderizar);

function toast(msg){
  const el=document.createElement('div');
  el.textContent=msg;
  el.style.position='fixed';
  el.style.right='20px';
  el.style.bottom='20px';
  el.style.padding='10px 14px';
  el.style.background='rgba(106,27,154,0.95)';
  el.style.color='white';
  el.style.borderRadius='10px';
  el.style.boxShadow='0 6px 20px rgba(0,0,0,0.15)';
  el.style.zIndex=9999;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1400);
}

renderizar();


// Aplica tema escuro se estiver salvo
const temaSalvo = localStorage.getItem("theme");
    if (temaSalvo === "dark") {
        document.body.classList.add("dark-mode");
    }
      
</script>
</body>
</html>
