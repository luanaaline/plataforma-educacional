<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matemática - Quiz</title>
<link rel="icon" type="image/png" href="psiu.png">
 
<style>
    body {
        margin: 0;
        background: #e6d4f5;
        font-family: "Poppins", sans-serif;
    }
 
    h1 {
        text-align: center;
        padding: 40px;
        font-size: 36px;
        font-weight: 600;
    }
 
    .container {
        max-width: 900px;
        background: white;
        margin: auto;
        padding: 40px;
        border-radius: 30px;
        text-align: center;
    }
 
    .question {
        font-size: 20px;
        line-height: 1.6;
        margin-bottom: 40px;
    }
 
    .option {
        background: #f5e8ff;
        padding: 20px;
        margin: 15px auto;
        width: 80%;
        border-radius: 50px;
        cursor: pointer;
        transition: 0.2s;
        font-size: 18px;
        border: 3px solid transparent;
    }
 
    .option:hover {
        background: #d9c2f0;
    }
 
    .selected {
        border: 3px solid #7b2cbf;
        background: #e9d1ff !important;
    }
 
    .btn-area {
        margin-top: 30px;
        display: flex;
        justify-content: center;
        gap: 20px;
    }
 
    .btn {
        background: white;
        padding: 15px 40px;
        border-radius: 40px;
        border: 2px solid #000;
        cursor: pointer;
        transition: 0.2s;
        font-size: 18px;
    }
 
    .btn:hover {
        background: #f0f0f0;
    }
 
    #revisar {
        display: none;
    }

/* DARK MODE */

body.dark-mode {
    background: #1b1030;          
    color: #f5e8ff;               
}

/* Container */
body.dark-mode .container {
    background: #2a183a;         
    color: #f5e8ff;
}

/* Opções */
body.dark-mode .option {
    background: #3a2352;          
    color: #f5e8ff;
}

body.dark-mode .option:hover {
    background: #4b2b6d;          
}

body.dark-mode .selected {
    border: 3px solid #c38aff;    
    background: #5c3386 !important;
}

/* Botões */
body.dark-mode .btn {
    background: #3a2352;
    color: #f5e8ff;
    border: 2px solid #c38aff;
}

body.dark-mode .btn:hover {
    background: #4b2b6d;
}

/* Título */
body.dark-mode h1 {
    color: #e7c6ff;
}

/* Número da questão */
body.dark-mode #qnumber {
    color: #e7c6ff;
}


</style>
</head>
<body>
 
<h1>Matemática</h1>
 
<div class="container">
 
    <h2 id="qnumber">QUESTÃO 1</h2>
    <p id="question" class="question"></p>
 
    <div id="options"></div>
 
    <div class="btn-area">
        <button id="revisar" class="btn" onclick="prevQuestion()">Revisar</button>
        <button class="btn" onclick="nextQuestion()">Próxima</button>
    </div>
 
</div>
 
<script>
const questions = [
    {
        q: "Qual é o valor de 25% de 200?",
        a: [
            "20",
            "25",
            "50",
            "75"
        ]
    },
    {
        q: "Qual é a soma dos ângulos internos de um triângulo?",
        a: [
            "180°",
            "90°",
            "360°",
            "270°"
        ]
    },
    {
        q: "Se (x + 5 = 12), qual é o valor de (x)?",
        a: [
            "5",
            "7",
            "12",
            "17"
        ]
    },
    {
        q: "Qual é o próximo número na sequência: 2, 4, 8, 16, …?",
        a: [
            "20",
            "24",
            "32",
            "64"
        ]
    },
    {
        q: "Qual é a área de um quadrado de lado 5 cm?",
        a: [
            "10 cm²",
            "20 cm²",
            "25 cm²",
            "50 cm²"
        ]
    },
    {
        q: "Qual é o valor de (7 × 8)?",
        a: [
            "48",
            "54",
            "56",
            "64"
        ]
    },
    {
        q: "Um carro percorre 60 km em 1 hora. Qual é sua velocidade média?",
        a: [
            "30 km/h",
            "60 km/h",
            "90 km/h",
            "120 km/h"
        ]
    },
    {
        q: "Qual é a fração equivalente a 0,25?",
        a: [
            "1/4",
            "1/2",
            "1/3",
            "2/5"
        ]
    },
    {
        q: "Qual é o resultado de ((3 + 5) × 2)?",
        a: [
            "10",
            "12",
            "16",
            "18"
        ]
    },
    {
        q: "Um produto estava com 40% de desconto e passou a custar R$ 90,00. Qual era o preço original antes do desconto?",
        a: [
            "R$ 120,00",
            "R$ 150,00",
            "R$ 210,00",
            "R$ 225,00"
        ]
    }
];


 
let current = 0;
let answers = new Array(questions.length).fill(null);
 
function loadQuestion() {
    document.getElementById("qnumber").innerText = "QUESTÃO " + (current + 1);
    document.getElementById("question").innerText = questions[current].q;
 
    const optArea = document.getElementById("options");
    optArea.innerHTML = "";
 
    questions[current].a.forEach((alt, i) => {
        let div = document.createElement("div");
        div.classList.add("option");
        div.innerText = alt;
 
        if (answers[current] === i) {
            div.classList.add("selected");
        }
 
        div.onclick = () => {
            document.querySelectorAll(".option").forEach(o => o.classList.remove("selected"));
            div.classList.add("selected");
            answers[current] = i;
        };
 
        optArea.appendChild(div);
    });
 
    const revisarBtn = document.getElementById("revisar");
    revisarBtn.style.display = current === 0 ? "none" : "inline-block";
}
 
function nextQuestion() {
    if (answers[current] === null) {
        alert("Selecione uma alternativa para continuar.");
        return;
    }
 
    if (current < questions.length - 1) {
        current++;
        loadQuestion();
    } else {
        // ⭐ SALVAR TODAS AS RESPOSTAS ⭐
        localStorage.setItem("quizAnswers", JSON.stringify(answers));
 
        // ⭐ REDIRECIONAR PARA O GABARITO ⭐
        window.location.href = "final-matematica.html";
    }
}
 
function prevQuestion() {
    if (current > 0) {
        current--;
        loadQuestion();
    }
}
 
loadQuestion();

// Aplica automaticamente o tema salvo
document.addEventListener("DOMContentLoaded", () => {
    const temaSalvo = localStorage.getItem("theme");

    if (temaSalvo === "dark") {
      document.body.classList.add("dark-mode");
    } else {
      document.body.classList.remove("dark-mode");
    }
  });

</script>
 
</body>
</html>
