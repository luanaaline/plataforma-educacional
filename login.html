<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | EducaÊ</title>
  <link rel="stylesheet" href="login.css">
  <link rel="icon" type="image/png" href="psiu.png">
</head>
<body>
  <div class="container">
    <div class="form-box">
      <img src="logo-completa.png" alt="Logo EducaÊ" class="logo">

      <h2>Entre na sua conta</h2>

      <input type="email" class="input-email" placeholder="Seu email">
      <input type="password" class="input-senha" placeholder="Sua senha">
      <button class="botao-login">Entrar</button>

      <p class="login">Não tem conta? <a href="cadastro.html">Cadastre-se</a></p>
    </div>
  </div>
  <script src="login.js"></script>
</body>
</html>
