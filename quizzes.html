<script> 

// Aplica automaticamente o tema salvo
document.addEventListener("DOMContentLoaded", () => {
    const temaSalvo = localStorage.getItem("theme");

    if (temaSalvo === "dark") {
      document.body.classList.add("dark-mode");
    } else {
      document.body.classList.remove("dark-mode");
    }
  });
