<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gabarito</title>
<link rel="icon" type="image/png" href="psiu.png">
 
<style>
    body {
        background: #e6d4f5;
        font-family: "Poppins", sans-serif;
        margin: 0;
        padding: 20px;
        text-align: center;
    }
 
    h1 {
        font-size: 40px;
        margin-bottom: 20px;
    }
 
    .card {
        background: white;
        width: 80%;
        margin: 30px auto;
        padding: 30px;
        border-radius: 25px;
        text-align: center;
    }
 
    .question {
        font-size: 20px;
        margin-bottom: 20px;
    }
 
    .option {
        padding: 15px;
        margin: 10px auto;
        width: 80%;
        border-radius: 40px;
        font-size: 18px;
        background: #f5e8ff;
        border: 2px solid transparent;
    }
 
    .correct {
        background: #b3ffb3 !important;
        border: 2px solid green;
    }
 
    .wrong {
        background: #ffb3b3 !important;
        border: 2px solid red;
    }
 
    .btn-area {
        margin-top: 20px;
        display: flex;
        justify-content: center;
        gap: 20px;
    }
 
    .btn {
        background: white;
        padding: 12px 30px;
        border-radius: 40px;
        border: 2px solid #000;
        cursor: pointer;
        font-size: 18px;
        transition: .2s;
    }
 
    .btn:hover {
        background: #eee;
    }

/* dark mode */

body.dark-mode {
    background: #1b1030;            /* Roxo bem escuro */
    color: #f5e8ff;                 /* Texto roxo claro */
}

/* Card central */
body.dark-mode .card {
    background: #2a183a;            /* Roxo escuro sofisticado */
    color: #f5e8ff;
}

/* Título */
body.dark-mode h1 {
    color: #e7c6ff;
}

/* Questão */
body.dark-mode .question {
    color: #f5e8ff;
}

/* Opções */
body.dark-mode .option {
    background: #3a2352;            /* Roxo médio escuro */
    color: #f5e8ff;
    border-color: transparent;
}

body.dark-mode .option:hover {
    background: #4b2b6d;            /* Roxo mais vibrante no hover */
}

/* Correta */
body.dark-mode .correct {
    background: #7effb3 !important; /* Verde corrigido mais neon no roxo */
    border: 2px solid #32d16d;
    color: #000;
}

/* Errada */
body.dark-mode .wrong {
    background: #ff8fa3 !important; /* Vermelho-rosado suave */
    border: 2px solid #ff4d6d;
    color: #000;
}

/* Botões */
body.dark-mode .btn {
    background: #3a2352;
    color: #f5e8ff;
    border: 2px solid #c38aff;
}

body.dark-mode .btn:hover {
    background: #4b2b6d;
}

/* Botões desativados no início */
body.dark-mode #voltar[style*="none"] {
    background: #3a2352;
}

/* Título das questões */
body.dark-mode h2 {
    color: #e7c6ff;
}

</style>
</head>
<body>
 
<h1>Gabarito</h1>
 
<div id="gabarito-card"></div>
 
<div class="btn-area">
    <button id="voltar" class="btn" onclick="prevQuestion()">Voltar</button>
    <button id="proxima" class="btn" onclick="nextQuestion()">Próxima</button>
</div>
 
<script>
const questions = [
    {
        q: "Qual é a classe gramatical da palavra 'rapidamente'?",
        a: ["Substantivo", "Adjetivo", "Advérbio", "Verbo"],
        correct: 2
    },
    {
        q: "Qual a diferença entre 'por que' e 'porque'?",
        a: [
            "'Por que' é pergunta e 'porque' é explicação",
            "'Por que' é explicação e 'porque' é pergunta",
            "Ambas são interrogativas",
            "Ambas são respostas"
        ],
        correct: 0
    },
    {
        q: "Qual é o plural de 'cidadão'?",
        a: ["Cidadãos", "Cidadães", "Cidadões", "Cidadãoses"],
        correct: 0
    },
    {
        q: "O que é uma oração subordinada?",
        a: ["Oração independente", "Oração que depende de outra", "Frase curta", "Frase exclamativa"],
        correct: 1
    },
    {
        q: "Qual é o sujeito na frase: 'O menino correu no parque'?",
        a: ["Menino", "Correu", "Parque", "No parque"],
        correct: 0
    },
    {
        q: "O que é um advérbio?",
        a: [
            "Palavra que modifica verbo, adjetivo ou outro advérbio",
            "Palavra que nomeia",
            "Palavra que indica ação",
            "Palavra que conecta frases"
        ],
        correct: 0
    },
    {
        q: "Qual é o antônimo de 'feliz'?",
        a: ["Alegre", "Triste", "Contente", "Satisfeito"],
        correct: 1
    },
    {
        q: "Transforme a frase afirmativa 'Ele estuda todos os dias' em negativa.",
        a: [
            "Ele não estuda todos os dias",
            "Ele nunca estuda todos os dias",
            "Ele não estuda hoje",
            "Ele estuda todos os dias"
        ],
        correct: 0
    },
    {
        q: "Qual é a função da vírgula na frase 'Ana, minha amiga, chegou cedo'?",
        a: [
            "Separar sujeito do verbo",
            "Iniciar frase",
            "Encerrar oração",
            "Destacar verbo"
        ],
        correct: 0
    },
    {
        q: "Qual é o sinônimo de 'inteligente'?",
        a: ["Burro", "Esperto", "Lento", "Fraco"],
        correct: 1
    }
];



 
const answers = JSON.parse(localStorage.getItem("quizAnswers"));
let current = 0;
 
function loadGabarito() {
    const card = document.getElementById("gabarito-card");
    card.innerHTML = "";
 
    let wrap = document.createElement("div");
    wrap.classList.add("card");
 
    let title = document.createElement("h2");
    title.innerText = "QUESTÃO " + (current + 1);
 
    let qText = document.createElement("p");
    qText.classList.add("question");
    qText.innerText = questions[current].q;
 
    wrap.appendChild(title);
    wrap.appendChild(qText);
 
    questions[current].a.forEach((opt, i) => {
        let div = document.createElement("div");
        div.classList.add("option");
        div.innerText = opt;
 
        if (i === questions[current].correct) {
            div.classList.add("correct");
        }
 
        if (answers && answers[current] === i && answers[current] !== questions[current].correct) {
            div.classList.add("wrong");
        }
 
        wrap.appendChild(div);
    });
 
    card.appendChild(wrap);
 
    document.getElementById("voltar").style.display = current === 0 ? "none" : "inline-block";
    document.getElementById("proxima").innerText =
        current === questions.length - 1 ? "Finalizar" : "Próxima";
}
 
function nextQuestion() {
    if (current < questions.length - 1) {
        current++;
        loadGabarito();
    } else {
        window.location.href = "finish-portugues.html";
    }
}
 
function prevQuestion() {
    if (current > 0) {
        current--;
        loadGabarito();
    }
}
 
loadGabarito();

// Aplica automaticamente o tema salvo
document.addEventListener("DOMContentLoaded", () => {
    const temaSalvo = localStorage.getItem("theme");

    if (temaSalvo === "dark") {
      document.body.classList.add("dark-mode");
    } else {
      document.body.classList.remove("dark-mode");
    }
  });


</script>
 
</body>
</html>
