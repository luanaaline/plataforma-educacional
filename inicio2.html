<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="3;url=comeco.html">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bem-vindo | EducaÊ</title>
  <link rel="icon" type="image/png" href="psiu.png">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color:#f3e8ff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-image: url('fundo-educae.svg'); /* Se tiver imagem de fundo */
      background-size: cover;
      background-position: center;
    }

    .mensagem {
      text-align: center;
      background: white;
      padding: 40px 50px;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      animation: fadeIn 1s ease-in-out;
    }

    .mensagem h1 {
      color: #6a1b9a;
      margin-bottom: 10px;
      font-size: 28px;
    }

    .mensagem p {
      color: #333;
      font-size: 16px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>
<body>
  <div class="mensagem">
    <h1>Bem-vindo ao EducaÊ!</h1>
    <p>Você entrou com sucesso no sistema.<br>Redirecionando para a página principal...</p>
  </div>
</body>
</html>
