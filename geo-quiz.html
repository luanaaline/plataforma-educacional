<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geografia - Quiz</title>
<link rel="icon" type="image/png" href="psiu.png">
 
<style>
    body {
        margin: 0;
        background: #e6d4f5;
        font-family: "Poppins", sans-serif;
    }
 
    h1 {
        text-align: center;
        padding: 40px;
        font-size: 36px;
        font-weight: 600;
    }
 
    .container {
        max-width: 900px;
        background: white;
        margin: auto;
        padding: 40px;
        border-radius: 30px;
        text-align: center;
    }
 
    .question {
        font-size: 20px;
        line-height: 1.6;
        margin-bottom: 40px;
    }
 
    .option {
        background: #f5e8ff;
        padding: 20px;
        margin: 15px auto;
        width: 80%;
        border-radius: 50px;
        cursor: pointer;
        transition: 0.2s;
        font-size: 18px;
        border: 3px solid transparent;
    }
 
    .option:hover {
        background: #d9c2f0;
    }
 
    .selected {
        border: 3px solid #7b2cbf;
        background: #e9d1ff !important;
    }
 
    .btn-area {
        margin-top: 30px;
        display: flex;
        justify-content: center;
        gap: 20px;
    }
 
    .btn {
        background: white;
        padding: 15px 40px;
        border-radius: 40px;
        border: 2px solid #000;
        cursor: pointer;
        transition: 0.2s;
        font-size: 18px;
    }
 
    .btn:hover {
        background: #f0f0f0;
    }
 
    #revisar {
        display: none;
    }

/* DARK MODE */

body.dark-mode {
    background: #1b1030;          
    color: #f5e8ff;               
}

/* Container */
body.dark-mode .container {
    background: #2a183a;         
    color: #f5e8ff;
}

/* Opções */
body.dark-mode .option {
    background: #3a2352;          
    color: #f5e8ff;
}

body.dark-mode .option:hover {
    background: #4b2b6d;          
}

body.dark-mode .selected {
    border: 3px solid #c38aff;    
    background: #5c3386 !important;
}

/* Botões */
body.dark-mode .btn {
    background: #3a2352;
    color: #f5e8ff;
    border: 2px solid #c38aff;
}

body.dark-mode .btn:hover {
    background: #4b2b6d;
}

/* Título */
body.dark-mode h1 {
    color: #e7c6ff;
}

/* Número da questão */
body.dark-mode #qnumber {
    color: #e7c6ff;
}



</style>
</head>
<body>
 
<h1>Geografia</h1>
 
<div class="container">
 
    <h2 id="qnumber">QUESTÃO 1</h2>
    <p id="question" class="question"></p>
 
    <div id="options"></div>
 
    <div class="btn-area">
        <button id="revisar" class="btn" onclick="prevQuestion()">Revisar</button>
        <button class="btn" onclick="nextQuestion()">Próxima</button>
    </div>
 
</div>
 
<script>
const questions = [
    {
        q: "O que é responsável pela formação das estações do ano no planeta Terra?",
        a: [
            "A distância da Terra até o Sol",
            "A inclinação do eixo terrestre",
            "O movimento de rotação",
            "A gravidade solar"
        ]
    },
    {
        q: "O que representa a escala 1:100.000 em um mapa?",
        a: [
            "Cada 100.000 cm no mapa valem 1 cm na realidade",
            "Cada 1 cm no mapa vale 100.000 cm na realidade",
            "Cada 1 cm no mapa vale 10 km na realidade",
            "O mapa é ampliado 100 mil vezes"
        ]
    },
    {
        q: "Qual é a forma de relevo predominante na Amazônia brasileira?",
        a: [
            "Depressões periféricas",
            "Planícies",
            "Chapadas",
            "Planaltos cristalinos"
        ]
    },
    {
        q: "O que caracteriza um país desenvolvido?",
        a: [
            "Alta taxa de natalidade",
            "Economia baseada no setor primário",
            "Alto IDH e forte industrialização",
            "Baixa expectativa de vida"
        ]
    },
    {
        q: "O que significa 'êxodo rural'?",
        a: [
            "A migração de pessoas para zonas agrícolas",
            "A saída de pessoas do campo para a cidade",
            "A migração internacional",
            "O crescimento da população do campo"
        ]
    },
    {
        q: "A produção agrícola e a extração de minérios pertencem a qual setor da economia?",
        a: [
            "Setor primário",
            "Setor secundário",
            "Setor terciário",
            "Setor quaternário"
        ]
    },
    {
        q: "Qual bioma brasileiro é o mais devastado proporcionalmente devido à agricultura e pecuária?",
        a: [
            "Pantanal",
            "Cerrado",
            "Caatinga",
            "Pampa"
        ]
    },
    {
        q: "Qual região brasileira possui clima equatorial?",
        a: [
            "Nordeste",
            "Sudeste",
            "Centro-Oeste",
            "Norte"
        ]
    },
    {
        q: "O que é 'metrópole'?",
        a: [
            "Uma cidade pequena com baixa densidade",
            "Uma cidade isolada sem influência regional",
            "Uma grande cidade com forte influência econômica e populacional",
            "Uma cidade exclusivamente industrial"
        ]
    },
    {
        q: "Qual é o maior rio em volume de água do mundo?",
        a: [
            "Rio Nilo",
            "Rio Yangtzé",
            "Rio Amazonas",
            "Rio Mississipi"
        ]
    }
];
 
let current = 0;
let answers = new Array(questions.length).fill(null);
 
function loadQuestion() {
    document.getElementById("qnumber").innerText = "QUESTÃO " + (current + 1);
    document.getElementById("question").innerText = questions[current].q;
 
    const optArea = document.getElementById("options");
    optArea.innerHTML = "";
 
    questions[current].a.forEach((alt, i) => {
        let div = document.createElement("div");
        div.classList.add("option");
        div.innerText = alt;
 
        if (answers[current] === i) {
            div.classList.add("selected");
        }
 
        div.onclick = () => {
            document.querySelectorAll(".option").forEach(o => o.classList.remove("selected"));
            div.classList.add("selected");
            answers[current] = i;
        };
 
        optArea.appendChild(div);
    });
 
    const revisarBtn = document.getElementById("revisar");
    revisarBtn.style.display = current === 0 ? "none" : "inline-block";
}
 
function nextQuestion() {
    if (answers[current] === null) {
        alert("Selecione uma alternativa para continuar.");
        return;
    }
 
    if (current < questions.length - 1) {
        current++;
        loadQuestion();
    } else {
        // ⭐ SALVAR TODAS AS RESPOSTAS ⭐
        localStorage.setItem("quizAnswers", JSON.stringify(answers));
 
        // ⭐ REDIRECIONAR PARA O GABARITO ⭐
        window.location.href = "final-geo.html";
    }
}
 
function prevQuestion() {
    if (current > 0) {
        current--;
        loadQuestion();
    }
}
 
loadQuestion();


// Aplica automaticamente o tema salvo
document.addEventListener("DOMContentLoaded", () => {
    const temaSalvo = localStorage.getItem("theme");

    if (temaSalvo === "dark") {
      document.body.classList.add("dark-mode");
    } else {
      document.body.classList.remove("dark-mode");
    }
  });


</script>
 
</body>
</html>
