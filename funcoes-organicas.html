<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Mental – Funções Orgânicas</title>

    <style>
        body {
            background: #e6d8f8;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .imagem-container {
            text-align: center;
            margin-top: 50px;
        }

        .imagem-container img {
            max-width: 70%;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .imagem-container img:hover {
            transform: scale(1.02);
        }

        /* Botão voltar */
        .btn-voltar {
            position: fixed;
            left: 20px;
            top: 20px;
            background: #7b3fe4;
            padding: 10px 18px;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
        }

        /* Modal tela cheia */
        .modal {
            display: none;
            position: fixed;
            z-index: 10;
            padding-top: 50px;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
        }

        .modal-conteudo {
            display: block;
            margin: auto;
            max-width: 90%;
            max-height: 85%;
        }

        .fechar {
            position: absolute;
            top: 20px;
            right: 35px;
            font-size: 45px;
            color: #fff;
            cursor: pointer;
        }

        .download {
            position: absolute;
            bottom: 40px;
            right: 50px;
            background: #7b3fe4;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <!-- Botão de voltar -->
    <a href="quimp.html" class="btn-voltar">← Voltar</a>

    <!-- Contêiner da imagem -->
    <div class="imagem-container">
        <img src="fu.png" alt="Mapa Mental Funções Orgânicas" id="mapa">
    </div>

    <!-- Modal tela cheia -->
    <div id="modal" class="modal">
        <span id="fechar" class="fechar">&times;</span>
        <img id="modal-img" class="modal-conteudo">
        <a id="download" class="download" download="mapa-mental.png">Baixar ⬇</a>
    </div>

    <script>
        const mapa = document.getElementById("mapa");
        const modal = document.getElementById("modal");
        const modalImg = document.getElementById("modal-img");
        const fechar = document.getElementById("fechar");
        const download = document.getElementById("download");

        // abrir a imagem em tela cheia
        mapa.onclick = function() {
            modal.style.display = "block";
            modalImg.src = this.src;
            download.href = this.src;
        }

        // botão fechar
        fechar.onclick = function() {
            modal.style.display = "none";
        }

        // fechar clicando fora da imagem
        modal.onclick = function(e) {
            if (e.target === modal) modal.style.display = "none";
        }
    </script>

</body>
</html>
